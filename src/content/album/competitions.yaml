- src: PICTURE8.jpeg
  title: Visit to St. Louis, Missouri
  alt: >-
    Huntington Robotics team members visited St. Louis, Missouri to challenge
    some of the best teams in the world in last year's game FIRST Steamworks and
    were met with great success. Thanks to our sponsors for supporting us on our
    way to the FIRST World Championships!
- src: PICTURE9.jpeg
  title: World Championship Match
  alt: >-
    Huntington’s Team 5016 drive team members participating in a match along
    with other teams from around the country at the FIRST World Championship at
    the  Edward Jones Dome in St. Louis, Missouri.
- src: PICTURE10.JPG
  title: Denny takes the field
  alt: Our 2019 robot "Denny" in action at the 2019 Hudson Valley Regional
- src: PICTURE11.JPG
  title: Community outreach
  alt: Team 5016 showing a Daisy Troop around at the Hudson Valley Regional
- src: PICTURE12.jpeg
  title: The Crowd is Involved
  alt: >-
    Members of Team 5016 support their team during a match during the FIRST
    World Championship.
- src: PICTURE13.JPG
  title: Robot at the Fundraiser
  alt: >-
    A Team 5016 member explains one of the team’s robots, "Sherman", during the
    team's fundraiser event at LaunchPad of Huntington. Thank you to LaunchPad
    of Huntington for supporting us and allowing us to use their venue and to
    all of the sponsors for supporting Team 67 so that we can continue to
    inspire the next generation of problem solvers.
- src: PICTURE14.jpg
  title: Winning the Chairmans Award 2018
  alt: >-
    Thanks to the hard work of our outreach and awards departments, as well as
    the gracious support from all of our sponsors, Team 5016 was able to win the
    most prestigious Award in FIRST: The Chairman's Award, qualifying us to go
    to the World Championships
- src: PICTURE15.JPG
  title: Pulling the Upset
  alt: >-
    Team 5016 competed as the first pick of the 6th-seeded alliance in the
    playoffs at the SBPLI Regional #1, alongside Team 2914 from Washington DC,
    and our Alliance Captain from Canada, Team 296.  Together, we upset the 3rd
    seeded alliance in the quarter-finals, before falling to the #2 seed in the
    semi-finals.
- src: PICTURE16.JPG
  title: Robot in Action
  alt: >-
    Our 2018 Robot "Don Quixote" is in action during a match at the SBPLI Regional
    #1, swerving across the field carrying a power cube that he looks to place
    on the scale.
- src: PICTURE17.JPG
  title: Future Engineers
  alt: >-
    Team 5016 welcomed local Girl Scouts from Troup 214 to the SBPLI Regional
    #1.  Huntington Robotics has been mentoring this troop over the past year.
