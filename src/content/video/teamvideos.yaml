  description: >-
    During the SBPLI regional at Hofstra University, a few members of Team 5016 were interviewed by the local news broadcasting network FiOS 1.
    The team members describe what our robot does, and answer questions about FIRST robotics.
- videoId: y55ZmpP0OYM
  title: FIRST Championship - St. Louis Qualifying Round 59
  description: >-
    In this match-up Team 5016’s “Monty” competes at against other robots in FIRST Steamworks, doing its part to secure a victory for the team!
    During this round, Huntington Robotics allied with the Digital Goats (team 829 of Indianapolis, Indiana) and Round Table Robotics (team 1792 from Oak Creek, Wisconsin).
