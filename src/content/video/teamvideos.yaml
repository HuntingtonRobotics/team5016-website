- videoId: qoHMk_4vE-A
  title: 2018 Reveal Video
  description: >-
    As the build season came to a close and the competition season began, FRC Team 5018 showcased "Sherman" and its wide range of abilities to other FIRST robotics teams via a reveal video.
    Huntington Robotics team 5016 presents its New York City Regional-winning 2016 FRC Robot: Sherman. Named for the American WWII tanks, Sherman was designed to compete in the 2016 FIRST Robotics challenge FIRST Stronghold.
    Special thanks to team member Cody Bograd for creating this video.
